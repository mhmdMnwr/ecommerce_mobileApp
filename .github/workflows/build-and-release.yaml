name: Build and Release APK

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    # REQUIRED: This permission allows the workflow to create a Release in your repo
    permissions:
      contents: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/release-key.jks

      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release-key.jks
          EOF

      - name: Read version name from pubspec.yaml
        id: version
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d '+' -f1 | tr -d ' \r')
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ github.run_number }}

      # 1. Create the GitHub Release and attach the APK
      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-build${{ github.run_number }}
          name: Release v${{ steps.version.outputs.name }} (Build ${{ github.run_number }})
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true

      # 2. Generate the direct download URL for the backend
      - name: Generate Direct Download URL
        id: download_url
        run: |
          REPO_OWNER_NAME="${{ github.repository }}"
          TAG="v${{ steps.version.outputs.name }}-build${{ github.run_number }}"
          APK_NAME="app-release.apk"
          
          # This is the standard predictable URL structure for GitHub Release assets
          URL="https://github.com/$REPO_OWNER_NAME/releases/download/$TAG/$APK_NAME"
          
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Generated URL: $URL"

      # 3. Notify your backend with the newly generated URL
      - name: Notify backend of new version
        run: |
          echo "Sending to backend: buildNumber=${{ github.run_number }}, versionName=${{ steps.version.outputs.name }}, downloadUrl=${{ steps.download_url.outputs.url }}"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.BACKEND_URL }}/api/app-version" \
            -H "Content-Type: application/json" \
            -H "x-ci-secret: ${{ secrets.CI_UPDATE_SECRET }}" \
            -d "{
              \"buildNumber\": ${{ github.run_number }},
              \"versionName\": \"${{ steps.version.outputs.name }}\",
              \"downloadUrl\": \"${{ steps.download_url.outputs.url }}\",
              \"releaseNotes\": \"Automated release from main branch via GitHub Releases\"
            }")
            
          HTTP_BODY=$(echo "$RESPONSE" | sed '$d')
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          
          echo "Backend Response Status: $HTTP_STATUS"
          echo "Backend Response Body: $HTTP_BODY"
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Failed to notify backend!"
            exit 1
          fi