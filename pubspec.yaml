name: ecommerce_app
description: "An e-commerce Flutter application."
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.1

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Routing
  go_router: ^15.1.2

  # Local Storage
  shared_preferences: ^2.5.3

  # Localization
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8

  # Responsive Sizing
  flutter_screenutil: ^5.9.3

  # Equatable for value equality
  equatable: ^2.0.7

  # Networking (for future API calls)
  dio: ^5.8.0+1

  # JSON Serialization
  json_annotation: ^4.12.0

  # Secure Storage for JWT tokens
  flutter_secure_storage: ^10.3.1

  # Map & Location Picker
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  flutter_slidable: ^4.0.3
  flutter_svg: ^2.3.0
  url_launcher: ^6.3.2

  # Local Notifications (shown when polling detects new notifications)
  flutter_local_notifications: ^19.2.1
  http: ^1.6.0
  package_info_plus: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  injectable_generator: ^2.7.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/settings/
    - assets/icons/bottom nav bar/
